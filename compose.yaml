services:
  app:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      DEFAULT_OLLAMA_MODEL: ${DEFAULT_OLLAMA_MODEL:-qwen3-vl:4b}
      DEFAULT_GEMINI_MODEL: ${DEFAULT_GEMINI_MODEL:-gemini-3.5-flash}
      MODEL_TIMEOUT_SECONDS: ${MODEL_TIMEOUT_SECONDS:-60}
      RTSP_STALL_TIMEOUT_SECONDS: ${RTSP_STALL_TIMEOUT_SECONDS:-30}
      HISTORY_MAX_BYTES: ${HISTORY_MAX_BYTES:-1073741824}
      MAX_INFANTS: ${MAX_INFANTS:-1}
      MAX_ADULTS: ${MAX_ADULTS:-4}
      STABILITY_WINDOW_SIZE: ${STABILITY_WINDOW_SIZE:-5}
      STABILITY_CONFIRMATION_FRAMES: ${STABILITY_CONFIRMATION_FRAMES:-3}
      STABILITY_CLEAR_FRAMES: ${STABILITY_CLEAR_FRAMES:-3}
      STABILITY_BOX_IOU_THRESHOLD: ${STABILITY_BOX_IOU_THRESHOLD:-0.2}
      STABILITY_BOX_EMA_ALPHA: ${STABILITY_BOX_EMA_ALPHA:-0.35}
      STABILITY_TIMELINE_MAX_POINTS: ${STABILITY_TIMELINE_MAX_POINTS:-500}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
